<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Clipboard body (larger, fills canvas) -->
  <rect x="6" y="16" width="104" height="108" rx="10" ry="10"
        fill="white" stroke="#4A4A4A" stroke-width="6" stroke-linejoin="round"/>

  <!-- Clipboard clip -->
  <rect x="34" y="6" width="48" height="22" rx="5" ry="5"
        fill="white" stroke="#4A4A4A" stroke-width="5.5"/>
  <rect x="46" y="1" width="24" height="13" rx="6.5" ry="6.5"
        fill="white" stroke="#4A4A4A" stroke-width="4.5"/>

  <!-- Paper area (inner) -->
  <rect x="18" y="34" width="80" height="82" rx="3" ry="3"
        fill="none" stroke="#6A6A6A" stroke-width="2.5"/>

  <!-- Page fold corner -->
  <path d="M76 116 L98 116 L98 94 Z" fill="white" stroke="#6A6A6A" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M76 116 L76 94 L98 94" fill="none" stroke="#6A6A6A" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Flowchart nodes -->
  <!-- Top-left rectangle node -->
  <rect x="24" y="42" width="26" height="18" rx="2.5" ry="2.5"
        fill="none" stroke="#4A4A4A" stroke-width="3"/>

  <!-- Bottom-left rectangle node -->
  <rect x="24" y="76" width="26" height="18" rx="2.5" ry="2.5"
        fill="none" stroke="#4A4A4A" stroke-width="3"/>

  <!-- Right rectangle node (chart/data) -->
  <rect x="64" y="56" width="28" height="24" rx="2.5" ry="2.5"
        fill="none" stroke="#4A4A4A" stroke-width="3"/>
  <!-- Mini bar chart inside -->
  <line x1="70" y1="76" x2="70" y2="68" stroke="#5A5A5A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="78" y1="76" x2="78" y2="62" stroke="#5A5A5A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="86" y1="76" x2="86" y2="66" stroke="#5A5A5A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Connection lines -->
  <line x1="50" y1="51" x2="64" y2="63" stroke="#4A4A4A" stroke-width="3"/>
  <line x1="50" y1="85" x2="64" y2="74" stroke="#4A4A4A" stroke-width="3"/>
  <line x1="37" y1="60" x2="37" y2="76" stroke="#4A4A4A" stroke-width="3"/>

  <!-- Connection dots -->
  <circle cx="37" cy="68" r="4" fill="#4A4A4A"/>
  <circle cx="56" cy="56" r="3.5" fill="#5A5A5A"/>
  <circle cx="56" cy="80" r="3.5" fill="#5A5A5A"/>

  <!-- Text lines on right side -->
  <line x1="66" y1="44" x2="92" y2="44" stroke="#6A6A6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="51" x2="88" y2="51" stroke="#6A6A6A" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom text lines -->
  <line x1="26" y1="100" x2="72" y2="100" stroke="#6A6A6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="108" x2="66" y2="108" stroke="#6A6A6A" stroke-width="3" stroke-linecap="round"/>

  <!-- Green Pen (tilted, resting on top-right of clipboard) -->
  <g transform="translate(98, 22) rotate(35)">
    <!-- Pen body -->
    <rect x="-5" y="-52" width="10" height="40" rx="2" ry="2" fill="#0d8390" stroke="#0a6b75" stroke-width="1.8"/>
    <!-- Pen grip/ring -->
    <rect x="-6" y="-14" width="12" height="6" rx="1.5" ry="1.5" fill="#0a6b75" stroke="#08565f" stroke-width="1.2"/>
    <!-- Pen tip cone -->
    <polygon points="-5,-9 5,-9 0,3" fill="#0d8390" stroke="#0a6b75" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Pen nib -->
    <polygon points="-2,1 2,1 0,7" fill="#4A4A4A"/>
    <!-- Pen cap top -->
    <rect x="-5.5" y="-56" width="11" height="7" rx="2.5" ry="2.5" fill="#0a6b75" stroke="#08565f" stroke-width="1.2"/>
    <!-- Pen clip -->
    <rect x="5" y="-56" width="3" height="22" rx="1.2" ry="1.2" fill="#0a6b75" stroke="#08565f" stroke-width="1"/>
  </g>
</svg>
